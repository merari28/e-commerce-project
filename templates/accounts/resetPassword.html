{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="section-content padding-y">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-10 mx-auto">

        <div class="card mt-5 shadow-sm">
          <article class="card-body p-4">

            <header class="mb-4 text-center">
              <h4 class="card-title mb-2">Nueva contraseña</h4>
              <p class="text-muted mb-0">
                Ingresa tu nueva contraseña y confírmala para restablecer el acceso a tu cuenta.
              </p>
            </header>

            {% include 'includes/alerts.html' %}

            <form action="{% url 'resetPassword' %}" method="POST">
              {% csrf_token %}

              <div class="form-group mb-4">
                <label class="mb-2">Nueva contraseña</label>
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  placeholder="Crear contraseña"
                  required
                  autocomplete="new-password"
                >
              </div>

              <div class="form-group mb-4">
                <label class="mb-2">Confirmar contraseña</label>
                <input
                  type="password"
                  name="confirm_password"
                  class="form-control"
                  placeholder="Confirmar contraseña"
                  required
                  autocomplete="new-password"
                >
              </div>

              <div class="form-group mb-0">
                <button type="submit" class="btn btn-primary btn-block w-100">
                  Restablecer contraseña
                </button>
              </div>

            </form>

            <div class="text-center mt-4">
              <a href="{% url 'login' %}">Volver al login</a>
            </div>

          </article>
        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
